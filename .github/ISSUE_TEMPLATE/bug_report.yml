name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
  - type: input
    id: version
    attributes:
      label: Keygate version
      placeholder: e.g. 1.0.0 or dev
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker
        - Binary
        - From source
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
